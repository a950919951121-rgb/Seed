<style>
html,body{margin:0;width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",Arial,sans-serif}
body{overflow:hidden;color:white;background:radial-gradient(circle at 18% 20%,rgba(255,255,255,.9) 0 45px,transparent 46px),radial-gradient(circle at 80% 18%,rgba(255,255,255,.9) 0 55px,transparent 56px),linear-gradient(180deg,#75c8ff 0%,#a8e0ff 46%,#79d36a 46%,#4caf50 100%)}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.12}
.monster{position:absolute;width:190px;height:190px;border-radius:50%;filter:drop-shadow(0 12px 18px rgba(0,0,0,.2))}
.m1{left:4vw;top:12vh;background:#ffd84a}
.m1:before{content:"";position:absolute;left:34px;top:-48px;width:34px;height:95px;background:#ffd84a;transform:rotate(-25deg);border-radius:50%;box-shadow:100px 40px 0 #ffd84a}
.m2{right:5vw;top:14vh;background:#6bc9ff}

.m3{left:6vw;bottom:10vh;background:#ff9a42}
.m4{right:7vw;bottom:10vh;background:#78d85a}
.face:after{content:"";position:absolute;left:55px;top:78px;width:16px;height:16px;background:#222;border-radius:50%;box-shadow:60px 0 0 #222}
.game{position:relative;z-index:1;width:100vw;height:100vh;box-sizing:border-box;padding:14px 16px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.counter{font-size:clamp(18px,3.8vw,30px);font-weight:900;color:#fff8cc;background:rgba(34,52,92,.48);padding:9px 18px;border-radius:999px;margin-bottom:4px;text-shadow:0 2px 0 rgba(0,0,0,.25)}
.emoji{font-size:clamp(70px,15vw,125px);line-height:1;margin-bottom:0;filter:drop-shadow(0 8px 12px rgba(0,0,0,.18))}
.word{font-weight:900;line-height:.95;text-align:center;margin-bottom:6px;color:white;word-break:keep-all;text-shadow:-5px -5px 0 #26457a,5px -5px 0 #26457a,-5px 5px 0 #26457a,5px 5px 0 #26457a,0 10px 20px rgba(0,0,0,.30)}
.zhuyin{font-size:clamp(34px,7.2vw,62px);font-weight:900;line-height:1.15;text-align:center;color:#fff8cc;margin-bottom:18px;text-shadow:0 3px 10px rgba(0,0,0,.30)}
.buttons{display:flex;gap:14px;width:min(92vw,820px)}
button{flex:1;min-height:74px;border:4px solid #233e77;border-radius:28px;background:linear-gradient(180deg,#ffd84a,#ffca1c);color:#233e77;font-size:clamp(26px,5.8vw,44px);font-weight:900;box-shadow:0 8px 0 #c69a11,0 12px 24px rgba(0,0,0,.2)}
button:active{transform:translateY(3px);box-shadow:0 5px 0 #c69a11}
.prev{background:linear-gradient(180deg,#ff6464,#ef3e3e);color:white;border-color:#7e1b1b;box-shadow:0 8px 0 #b22828,0 12px 24px rgba(0,0,0,.2)}
</style>
</head>
<body>
<div class="bg">

</main>

let order = [...Array(items.length).keys()];

for (let i = order.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [order[i], order[j]] = [order[j], order[i]];
}

let index = 0;

function update() {
  const current = items[order[index]];
  const wordEl = document.getElementById("word");

  document.getElementById("zhuyin").textContent = current.zhuyin;
  document.getElementById("emoji").textContent = current.emoji;
  document.getElementById("counter").textContent = `第 ${index + 1} / ${order.length} 個詞彙`;

  wordEl.textContent = current.word;

  const len = [...current.word].length;

  if (len <= 2) {
  wordEl.style.fontSize = "clamp(170px,38vw,340px)";
  wordEl.style.letterSpacing = "-0.04em";
} else if (len === 3) {
  wordEl.style.fontSize = "clamp(130px,30vw,250px)";
  wordEl.style.letterSpacing = "-0.03em";
} else if (len === 4) {
  wordEl.style.fontSize = "clamp(100px,23vw,200px)";
  wordEl.style.letterSpacing = "-0.02em";
} else {
  wordEl.style.fontSize = "clamp(80px,18vw,160px)";
  wordEl.style.letterSpacing = "0";
  }
}

function nextWord() {
  index++;
  if (index >= order.length) index = 0;
  update();
}

function prevWord() {
  index--;
  if (index < 0) index = order.length - 1;
  update();
}

update();
